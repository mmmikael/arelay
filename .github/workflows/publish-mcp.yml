name: Publish to npm and MCP Registry

# Publishes @arelay/cli to npm and the server metadata to the MCP Registry
# whenever a cli-v* tag is pushed (e.g. cli-v0.1.1). Requires the NPM_TOKEN
# repository secret; MCP Registry auth uses GitHub OIDC (no secret needed).

on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC authentication for the MCP Registry
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/arelay/package-lock.json

      - name: Install CLI dependencies
        working-directory: packages/arelay
        run: npm ci

      - name: Publish @arelay/cli to npm
        working-directory: packages/arelay
        # Skip if this version is already on npm so the registry step can be
        # re-run (e.g. via workflow_dispatch) without aborting here.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@arelay/cli@$VERSION" version >/dev/null 2>&1; then
            echo "@arelay/cli@$VERSION already published; skipping npm publish."
          else
            npm publish # prepublishOnly runs build + tests
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
