<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="An end-to-end encrypted inbox for secure deliveries from AI agents."
		/>
		<meta name="application-name" content="Agent Relay" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Agent Relay" />
		<meta name="theme-color" content="#020617" />
		<script nonce="%sveltekit.nonce%">
			try {
				const storedTheme = localStorage.getItem('agentRelay:theme');
				const dark = storedTheme !== 'light';
				document.documentElement.classList.toggle('dark', dark);
				document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
			} catch {}
		</script>
		<script nonce="%sveltekit.nonce%">
			try {
				const optOutKey = 'agentRelay:excludeAnalytics';
				const canonical = localStorage.getItem(optOutKey);
				const umamiDisabled = localStorage.getItem('umami.disabled');
				if (canonical === '1' || umamiDisabled) {
					localStorage.setItem(optOutKey, '1');
					localStorage.setItem('umami.disabled', '1');
				} else if (canonical === '0') {
					localStorage.removeItem('umami.disabled');
				}
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
